name: CI

on:
  workflow_dispatch: {}

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_CXX_STANDARD=11

      - name: Build Project
        run: |
          cd build
          cmake --build . --config ${{ env.BUILD_TYPE }}

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure -C ${{ env.BUILD_TYPE }}
