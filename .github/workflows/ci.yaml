version: 1.0

on:
  workflow_dispatch: {}

env:
  BUILD_TYPE: Release

matrix:
  - os: linux
    compiler: gcc
  - os: linux
    compiler: clang
  - os: windows
    compiler: msvc

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: linux
            compiler: gcc
          - os: linux
            compiler: clang
          - os: windows
            compiler: msvc

    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_CXX_STANDARD=11

      - name: Build Project
        run: |
          cd build
          cmake --build . --config $BUILD_TYPE

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure -C $BUILD_TYPE
