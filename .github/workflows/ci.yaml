name: CI

on:
  workflow_dispatch: {}

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: linux-latest
            compiler: gcc
          - os: linux-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
      
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}
      
      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ env.BUILD_TYPE }}
